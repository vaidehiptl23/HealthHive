{% extends 'base.html' %}

{% block title %}Login - HealthHive Admin{% endblock %}

{% block content %}
<div class="container">
    <div style="display: flex; justify-content: center; align-items: center; min-height: 90vh;">
        <div class="card" style="max-width: 450px; width: 100%; text-align: center;">
            <!-- Logo/Avatar Section -->
            <div style="margin-bottom: 40px;">
                <div style="width: 100px; height: 100px; background: var(--primary-gradient); border-radius: 50%; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow);">
                    <i class="fas fa-user-shield" style="font-size: 40px; color: white;"></i>
                </div>
                <h1 style="font-size: 32px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px;">
                    Welcome Back
                </h1>
                <p style="color: var(--text-muted); font-size: 16px;">
                    Sign in to access your admin dashboard
                </p>
            </div>

            <!-- Login Form -->
            <form method="post" style="text-align: left;">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="username" class="form-label">
                        <i class="fas fa-user" style="margin-right: 8px;"></i>
                        Username
                    </label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        class="form-control" 
                        placeholder="Enter your username" 
                        required
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock" style="margin-right: 8px;"></i>
                        Password
                    </label>
                    <div style="position: relative;">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-control" 
                            placeholder="Enter your password" 
                            required
                            autocomplete="current-password"
                            style="padding-right: 50px;"
                        >
                        <button 
                            type="button" 
                            onclick="togglePassword()" 
                            style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px;"
                            title="Toggle password visibility"
                        >
                            <i class="fas fa-eye" id="password-toggle-icon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 24px; font-size: 16px; padding: 18px;">
                    <i class="fas fa-sign-in-alt"></i>
                    Sign In
                </button>
            </form>

            <!-- Additional Info -->
            <div style="margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border-color);">
                <p style="color: var(--text-muted); font-size: 14px;">
                    <i class="fas fa-shield-alt" style="margin-right: 8px; color: #667eea;"></i>
                    Secure admin access for HealthHive platform
                </p>
            </div>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    const passwordField = document.getElementById('password');
    const toggleIcon = document.getElementById('password-toggle-icon');
    
    if (passwordField.type === 'password') {
        passwordField.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
    } else {
        passwordField.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
    }
}

// Add some interactive effects
document.addEventListener('DOMContentLoaded', function() {
    const inputs = document.querySelectorAll('.form-control');
    
    inputs.forEach(input => {
        input.addEventListener('focus', function() {
            this.parentElement.style.transform = 'scale(1.02)';
        });
        
        input.addEventListener('blur', function() {
            this.parentElement.style.transform = 'scale(1)';
        });
    });
});
</script>

<style>
.form-group {
    transition: transform 0.2s ease;
}

.card {
    animation: fadeInUp 0.6s ease;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
{% endblock %}
